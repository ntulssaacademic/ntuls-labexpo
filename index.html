<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 生命科學實驗室博覽會 - 探索你的科學家類型</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>



    <style>
        /* --- 唯美水藍色調與全域設定 --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #E0F2F1 0%, #B2EBF2 100%);
            --text-navy: #1A365D; 
            --btn-blue: #4FB0C6; 
            --btn-blue-hover: #3A96A8;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            color: var(--text-navy);
            background-color: #f4f9f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-app {
            width: 100%;
            max-width: 420px; 
            min-height: 100vh;
            background: var(--bg-gradient);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        @media (min-width: 450px) {
            .game-app {
                min-height: 800px;
                height: 100vh;
                border-radius: 20px;
                margin: 20px 0;
            }
        }

        .screen {
            display: none; 
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.6rem; margin-bottom: 15px; line-height: 1.4; color: var(--text-navy); }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: var(--text-navy); }
        
       .question-text { 
            font-size: 1.25rem; 
            margin-bottom: 25px; 
            line-height: 1.5; 
            font-weight: bold; 
            text-align: left; 
            padding: 0 5px; 
        }
        
        p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; color: #34495e; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border: none;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary { 
            background: var(--btn-blue); 
            color: white; 
            box-shadow: 0 4px 15px rgba(79, 176, 198, 0.3); 
        }
        .btn-primary:active { transform: scale(0.96); background: var(--btn-blue-hover); }

        .btn-option { 
            background: rgba(255, 255, 255, 0.9); 
            color: var(--text-navy); 
            border: 1px solid #fff; 
            text-align: left; 
            font-size: 0.95rem;
            font-weight: normal;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            line-height: 1.4;
        }
        .btn-option:active { background: #E0F2F1; transform: scale(0.98); }

        .progress-container { 
            width: 100%; height: 6px; 
            background: rgba(255,255,255,0.6); 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
        }
        .progress-bar { 
            width: 0%; height: 100%; 
            background: var(--btn-blue); 
            transition: width 0.4s ease; 
        }

        #capture-area {
            background: linear-gradient(135deg, #E0F2F1 0%, #B2EBF2 100%);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
        }
        
        .result-box {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .archetype-img { width: 130px; margin: 15px 0; }
        .quote { font-style: italic; color: var(--btn-blue); font-size: 0.95rem; margin-top: 15px; font-weight: bold;}
        
        .expo-box { 
            border: 2px dashed var(--btn-blue); 
            border-radius: 15px; 
            padding: 15px; 
            margin-top: 20px; 
            font-size: 0.9rem; 
            background: rgba(255,255,255,0.9); 
            color: var(--text-navy);
            line-height: 1.5;
        }

        #final-image {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; 
        }
    </style>
</head>
<body>

<div class="game-app">
    
    <!-- 1. 首頁 -->
    <div class="screen active" id="home-screen">
        <div class="glass-card" style="margin-top: 50px;">
            <h1>你是哪一型科學家？</h1>
            <p>2026 生命科學實驗室博覽會<br>探索隱藏在你體內的科學家靈魂</p>
            <button class="btn btn-primary" onclick="showScreen('q0-screen')">開始測驗 Start</button>
        </div>
    </div>

    <!-- 2. Step 0：分流問卷 -->
    <div class="screen" id="q0-screen">
        <div class="glass-card">
            <h2>確認身分狀態</h2>
            <p>請告訴我們你目前的狀態，<br>讓我們為你準備最適合的情境：</p>
            <button class="btn btn-option" style="text-align:center;" onclick="startGame('general')">我是充滿好奇的一般大眾<br><span style="font-size:0.8rem; color:#666;">(一般大眾/非生科背景)</span></button>
            <button class="btn btn-option" style="text-align:center;" onclick="startGame('pro')">我正在生命科學領域打滾中<br><span style="font-size:0.8rem; color:#666;">(大學生/研究生/熟悉實驗日常)</span></button>
        </div>
    </div>

    <!-- 3. 正式測驗題 -->
    <div class="screen" id="quiz-screen">
        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
        <div class="glass-card">
            <h3 class="question-text" id="question-text">題目載入中...</h3>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- 4. Loading 轉場 -->
    <div class="screen" id="loading-screen">
        <div class="glass-card">
            <h2 id="loading-msg">正在萃取你的科學 DNA...</h2>
            <p style="color: #666;">請稍候</p>
        </div>
    </div>

    <!-- 5. 結果頁 -->
    <div class="screen" id="result-screen">
        <img id="final-image" alt="測驗結果截圖">
        <div id="capture-area">
            <p style="font-weight: bold; color: #666; margin-bottom: 10px;">我的科學家靈魂是...</p>
            <div class="result-box">
                <h1 id="result-title">類型名稱</h1>
                <img src="" id="result-img" class="archetype-img" alt="專屬角色">
                <p id="result-desc" style="font-size: 0.9rem; text-align: left; margin-bottom: 0;"></p>
                <p class="quote" id="result-quote"></p>
            </div>
            <div class="expo-box">
                🎉 <b>截圖抽大獎！</b><br>
                憑此截圖至 5/16日 臺大生命科學館<br>【生命科學實驗室博覽會】現場即可參加抽獎！
            </div>
        </div>

        <p style="font-size: 0.85rem; color: #666; margin-top: 15px;">⬆️長按上方圖片即可儲存，分享至限時動態！</p>
        
        <button class="btn btn-primary" style="margin-top: 10px;" onclick="shareResult()">📲 一鍵分享給朋友</button>
        <button class="btn btn-option" style="text-align: center; border: 2px solid var(--btn-blue); color: var(--btn-blue);" onclick="location.href='https://sites.google.com/view/ntuls-labexpo'">了解博覽會詳情</button>
    </div>

</div>

<script>
    const archetypes = {
        visionary: { title: "腦洞大開的發想家", desc: "你的大腦隨時都在進行背景運算，擅長從碎片資訊中建構模型。對你來說，科學與生活都是一場優雅的思維藝術", quote: "「行動還沒開始，已經在腦中推演完結局了」", img: "腦.png" },
        master: { title: "精準至上的實作派", desc: "你是最可靠的存在。操作精準無比，重視邏輯與實證，任何誤差都逃不過你銳利的雙眼，數據在你手中就是真理", quote: "「我的成果會說話，而且只說實話」", img: "燒杯.png" },
        observer: { title: "見微知著的細節控", desc: "你的觀察力極強，總能捕捉到別人忽略的關鍵誤差或全新機制。你是推動微觀突破、找出盲點的關鍵力量", quote: "「魔鬼藏在細節裡，而我就是抓魔鬼的人」", img: "細胞.png" },
        integrator: { title: "縱觀全局的系統家", desc: "你關注整體系統的互動與動態平衡。能將微觀發現拼湊成宏觀藍圖，擅長跨域連結，尋找事物背後的深層關聯", quote: "「牽一髮而動全身，探索就是要看見全貌」", img: "老鼠.png" },
        explorer: { title: "靈活應變的拓荒者", desc: "適應力極強。討厭一成不變，充滿好奇心，能在失敗與未知中迅速進化，尋找全新的邊界與創意可能", quote: "「計畫趕不上變化，我就跟著變化一起演化」", img: "微生物.png" },
        hacker: { title: "直擊要害的破解者", desc: "解決問題的專家。擅長利用工具或新技術突破瓶頸，討厭做白工。對你而言，生活就是一場尋找捷徑的闖關遊戲", quote: "「與其繞路走，不如找方法把牆拆了」", img: "噬菌體.png" }
    };

    const questions_pro = [
        { q: "實驗做到一半，你發現實驗步驟中需要的溶液已經被用光了，這時候你會...？", options: [
            { t: "停下動作，找出成分表，精準地重新配製一瓶", score: { master: 2 } },
            { t: "腦筋一轉，翻找其他配方，看有沒有成分相近的替代方案可以頂著用", score: { explorer: 2 } },
            { t: "趁這個空檔，檢查一下舊溶液的配方，懷疑它是不是導致上次實驗失敗的元凶", score: { observer: 2 } },
            { t: "直接寫個自動化程式，設定以後只要庫存低於一定量就自動發信通知負責人訂貨", score: { hacker: 2 } }
        ]},
    { q: "下週輪到你在開會時報實驗進度，面對一堆雜亂的數據，你會怎麼整理？", options: [
            { t: "畫張漂亮的假說圖，專注於這組數據能如何推進現有的模型", score: { visionary: 2 } },
            { t: "比對各種文獻，尋找數據背後潛在的系統性關聯", score: { integrator: 2 } },
            { t: "仔細比對控制組與實驗組每一個微小的差異，把偏差值挑出來看有沒有特殊意義", score: { observer: 2 } },
            { t: "放棄手動整理，把數據全丟進程式裡，用生資套件跑出最客觀的圖表", score: { hacker: 2 } }
        ]},
        { q: "指導教授丟了一篇剛發表在頂尖期刊上，但充滿爭議的paper給你，打開PDF後你第一步看哪？", options: [
            { t: "先看 Abstract 和 Discussion，思考這會如何顛覆現有學說", score: { visionary: 2 } },
            { t: "直奔 Materials and Methods，檢視樣本數跟實驗設計是否合理", score: { master: 2 } },
            { t: "跳過正文，放大 Result figures，尋找作者過度解讀的微小數據偏差", score: { observer: 2 } },
            { t: "不跳讀！為了掌握最完整的脈絡，從第一個字開始老老實實地仔細往下看", score: { integrator: 2 } }
        ]},
        { q: "你剛跑完一批重要的樣本分析，結果出來的數據跟你的假說完全不一樣，這時候你會？", options: [
            { t: "覺得超有趣！立刻轉換方向，推測這是個全新現象，準備提出新假說", score: { visionary: 2 } },
            { t: "迅速寫一段程式腳本來重新清洗數據，確認是不是演算法或參數設定造成的誤差", score: { hacker: 2 } },
            { t: "翻出實驗紀錄本，從試劑批號到儀器參數，仔細找出是哪一個步驟出了問題", score: { master: 2 } },
            { t: "不執著於單一結果，馬上換一種技術再測一次看看", score: { explorer: 2 } }
        ]},
        { q: "做實驗遇到瓶頸、卡關了好幾週，你會如何轉換心情尋找靈感？", options: [
            { t: "去操場跑個幾圈流流汗，讓腦袋放空重新開機", score: { explorer: 2 } },
            { t: "狂刷網路論壇，看看有沒有大神分享過類似的除錯方法", score: { hacker: 2 } },
            { t: "把 Protocol 拿出來從頭到尾默寫一次，重新標記所有關鍵體積與濃度", score: { master: 2 } },
            { t: "跑去聽一場完全不同領域的演講，期待跨域碰撞出新火花", score: { visionary: 2 } }
        ]},
        { q: "老闆指派了一個全新的研究方向，需要用到你從未接觸過的複雜技術，你會怎麼著手？", options: [
            { t: "興奮地想像這項技術能為現有的模型帶來什麼突破性的新觀點", score: { visionary: 2 } },
            { t: "思考如何將這個新技術與實驗室現有的技術平台完美串聯", score: { integrator: 2 } },
            { t: "仔細研讀原始文獻的方法，試圖把每個操作參數跟試劑條件都徹底弄懂", score: { master: 2 } },
            { t: "搜尋市面上有沒有現成的套組 (Commercial kit)，能直接繞過繁瑣步驟的捷徑就絕對不自己慢慢摸索", score: { hacker: 2 } }
        ]},
        { q: "參加「生命科學實驗室博覽會」走進一間陌生的實驗室攤位時，你最想先問學長姐什麼？", options: [
            { t: "「你們實驗室的風氣怎麼樣？容許大家自由探索想研究的方向嗎？」", score: { explorer: 2 } },
            { t: "「你們的題目未來可以怎麼與其他領域結合？」", score: { integrator: 2 } },
            { t: "「這張海報上的圖，某個數值好像有點不尋常？」", score: { observer: 2 } },
            { t: "「你們平常最常使用的核心技術跟儀器有哪些？」", score: { master: 2 } }
        ]}
    ];

    const questions_general = [
        { q: "週末跟同學一起去玩密室逃脫，當大家卡在同一個房間找不到任何線索時，你會？", options: [
            { t: "到處亂翻亂碰，把房間裡的每個抽屜、花瓶和牆壁都摸過一遍", score: { explorer: 2 } },
            { t: "試圖找出這家密室常見的機關套路，或者乾脆嘗試暴力破解猜密碼鎖", score: { hacker: 2 } },
            { t: "把牆上的圖案跟上一個房間的線索串聯起來，推敲出完整的隱藏劇情", score: { integrator: 2 } },
            { t: "腦洞大開，提出各種天馬行空、連關主都沒想過的瘋狂解謎方法", score: { visionary: 2 } }
        ]},
        { q: "週末決定去超市買食材回家自己煮一鍋咖哩，你會怎麼做？", options: [
            { t: "嚴格遵守包裝背面的食譜，水和醬塊比例抓得剛剛好", score: { master: 2 } },
            { t: "看冰箱有什麼就加什麼，挑戰一鍋充滿未知的創意料理", score: { explorer: 2 } },
            { t: "仔細挑選食材，思考不同蔬菜的甜味對整鍋湯頭的整體影響", score: { integrator: 2 } },
            { t: "買微波白飯配調理包，用最短的時間吃飽，有效率地解決一餐", score: { hacker: 2 } }
        ]},
        { q: "你最喜歡的電子玩具或精緻文具突然壞掉了，這時候你會怎麼辦？", options: [
            { t: "馬上去找說明書，按照上面的步驟一步一步檢查是哪裡故障", score: { master: 2 } },
            { t: "把它全部拆開來，仔細觀察每一個小齒輪和零件有沒有裂痕", score: { observer: 2 } },
            { t: "覺得太棒了，腦洞大開，剛好可以趁機把它改造成另一個全新的玩具！", score: { visionary: 2 } },
            { t: "拿手邊的其他零件或膠帶東拼西湊，試圖找出另一種特別的玩法", score: { explorer: 2 } }
        ]},
        { q: "逛書店時，你看到一本講述「未來科技與恐龍復活」的雜誌，你會最先看哪裡？", options: [
            { t: "翻到首頁看「科學家如何想像 100 年後的世界」", score: { visionary: 2 } },
            { t: "尋找裡面有沒有介紹「恐龍跟現代環境如何和平共存」的分析", score: { integrator: 2 } },
            { t: "找尋「科學家具體用了什麼技術與步驟」來萃取古代恐龍 DNA", score: { master: 2 } },
            { t: "覺得雜誌寫得太慢，直接拿出手機搜尋最新的恐龍復活科學影片來看", score: { hacker: 2 } }
        ]},
        { q: "走在路上，你突然看到一群螞蟻正在搬運一塊巨大的餅乾屑，你會？", options: [
            { t: "蹲下來死盯著牠們的路線，觀察是哪一隻螞蟻在發號施令", score: { observer: 2 } },
            { t: "思考這群螞蟻的巢穴在哪裡，牠們是如何在大自然中分工合作的", score: { integrator: 2 } },
            { t: "故意在旁邊放一顆糖果，測試牠們會不會因此改變路線", score: { explorer: 2 } },
            { t: "腦中開始幻想如果螞蟻變得跟人一樣大，會建立什麼樣的城市", score: { visionary: 2 } }
        ]},
        { q: "滑 IG 時，看到一個超神奇的生活冷知識影片，你的反應是？", options: [
            { t: "馬上自己動手實驗看看是不是真的！", score: { explorer: 2 } },
            { t: "直接滑到留言區，看有沒有大神已經破解或整理好真相懶人包", score: { hacker: 2 } },
            { t: "反覆重播影片，像名偵探一樣尋找畫面裡有沒有造假或剪接的破綻", score: { observer: 2 } },
            { t: "上網仔細查證背後的科學原理，確認它是不是毫無根據的假消息", score: { master: 2 } }
        ]},
        { q: "今天你來到「生命科學實驗室博覽會」，走進會場的第一件事你會做什麼？", options: [
            { t: "直接研究大會的抽獎規則，找出能最快獲得抽獎資格的完美捷徑", score: { hacker: 2 } },
            { t: "把每個攤位上的標本跟器材都摸一遍，體驗自己動手操作的感覺", score: { master: 2 } },
            { t: "觀察攤位海報上的每一張圖片，看能不能找到有趣的微小細節", score: { observer: 2 } },
            { t: "問攤位上的大哥哥大姊姊：「請問你們的研究跟我們的日常生活有什麼關係？」", score: { integrator: 2 } }
        ]}
    ];
    let currentQuestions = questions_general; // 為求展示先給預設值，實際使用時記得把題庫補齊
    let currentQ = 0;
    let userScores = { visionary: 0, master: 0, observer: 0, integrator: 0, explorer: 0, hacker: 0 };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(type) {
        currentQuestions = (type === 'general') ? questions_general : questions_pro;
        currentQ = 0;
        userScores = { visionary: 0, master: 0, observer: 0, integrator: 0, explorer: 0, hacker: 0 };
        showScreen('quiz-screen');
        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentQuestions[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn btn-option";
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(opt.score);
            container.appendChild(btn);
        });

        const progress = ((currentQ) / currentQuestions.length) * 100;
        document.getElementById('progress').style.width = `${progress}%`;
    }

    function selectOption(scoreWeight) {
        for (let type in scoreWeight) { userScores[type] += scoreWeight[type]; }
        currentQ++;
        if (currentQ < currentQuestions.length) { loadQuestion(); } else { calculateResult(); }
    }

    function calculateResult() {
        document.getElementById('progress').style.width = `100%`;
        showScreen('loading-screen');

        let maxType = Object.keys(userScores).reduce((a, b) => userScores[a] > userScores[b] ? a : b);
        const res = archetypes[maxType];

        document.getElementById('result-title').innerText = res.title;
        document.getElementById('result-desc').innerText = res.desc;
        document.getElementById('result-quote').innerText = res.quote;
        document.getElementById('result-img').src = res.img; 

        setTimeout(() => {
            showScreen('result-screen');
            generateImage();
        }, 1500);
    }

    function generateImage() {
        const captureArea = document.getElementById('capture-area');
        const finalImage = document.getElementById('final-image');
        
        html2canvas(captureArea, { scale: 2, backgroundColor: null }).then(canvas => {
            finalImage.src = canvas.toDataURL("image/png");
            finalImage.style.display = "block"; 
            captureArea.style.display = "none"; 
        });
    }

    function shareResult() {
        if (navigator.share) {
            navigator.share({
                title: '我是哪一型科學家？',
                text: '快來測測你的科學家靈魂！憑截圖還能到生命科學實驗室博覽會抽大獎喔🔬',
                url: window.location.href // 會自動抓取你部屬在 Github Pages 的網址
            }).catch((error) => console.log('分享失敗', error));
        } else {
            alert("您的裝置瀏覽器不支援一鍵分享，請直接長按圖片儲存分享至限時動態喔！");
        }
    }
</script>

</body>
</html>
